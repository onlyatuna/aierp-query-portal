name: CI/CD Pipeline (ERP Query Portal)

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  # 您的新專案 Image Name
  IMAGE_TAG: ghcr.io/${{ github.repository }}:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      # 1. 加入 GCP 伺服器到 known_hosts
      - name: Add GCP host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.GCP_PROD_HOST }} >> ~/.ssh/known_hosts

      # 2. 將 docker-compose 傳送到 GCP 伺服器的 /home/onlyatuna/nl2sql-app/
      - name: Copy docker-compose file to GCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/nl2sql-app/"

      # 3. SSH 進入 GCP 執行部署
      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            # 準備專案資料夾
            mkdir -p ~/nl2sql-app
            cd ~/nl2sql-app || exit 1
            
            # 使用 Github Token 登入以拉取 Image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            docker pull "${{ env.IMAGE_TAG }}"
            
            # 安全產生 .env 檔案
            # (注意：這裡的 Secrets 需要您去這個 aierp-query-portal 的 Repository > Settings 裡面設定)
            cat << 'EOF' > .env
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            APP_PORT=8000
            EOF
            
            # 重啟服務 (使用健康檢查輪詢)
            echo "Recreating app container..."
            IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --no-deps --force-recreate --remove-orphans
            
            echo "Waiting for container to become healthy..."
            MAX_WAIT=120
            ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              # 取得容器健康狀態 (服務名稱為 nl2sql-app)
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' nl2sql-app 2>/dev/null || echo "starting")
              echo "  [$ELAPSED s] Container health: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ ERP Portal is healthy!"
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            
            if [ "$STATUS" != "healthy" ]; then
              echo "⚠️ Warning: Container did not become healthy within ${MAX_WAIT}s."
              docker compose logs --tail=30 nl2sql-app
            fi
            
            # 強制通知 Caddy 重新連結 (Caddy 定義在 ~/shop-app)
            cd ~/shop-app && docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true
            
            # 清理閒置的 Image 以節省硬碟空間
            docker image prune -f
