services:
  nl2sql-app:
    image: ${IMAGE_TAG:-ghcr.io/onlyatuna/aierp-query-portal:latest}
    container_name: nl2sql-app
    restart: always
    env_file:
      - .env
    ports:
      # 直接掛載 8000 埠口供 Caddy 轉發
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 500M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
